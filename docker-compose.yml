services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: studiopm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}
      POSTGRES_DB: studiopm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studiopm -d studiopm"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Run drizzle-kit push against the live DB to apply the current schema.
  # Uses the `base` builder stage (which has devDependencies installed —
  # drizzle-kit is a devDep) since the `runner` stage is pruned with --prod.
  # Runs to completion and exits; `app` waits on it via depends_on.
  migrate:
    build:
      context: .
      target: base
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    environment:
      DATABASE_URL: postgres://studiopm:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}@db:5432/studiopm
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://studiopm:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in your .env}@db:5432/studiopm
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET to a strong random string (16+ chars) in your .env}
      # --- Bootstrap admin (seeded at container start) ---
      # When both are set, the entrypoint creates (or rotates the password of)
      # this admin before the app starts. Leave unset to seed manually via
      # `docker compose exec app node scripts/dist/create-admin.mjs`.
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-}
      # Public URL of Collabora reachable from end users' browsers.
      # When running locally: http://localhost:9980. In production set to https://office.your-domain.tld.
      COLLABORA_URL: ${COLLABORA_URL:-http://localhost:9980}
      # URL Collabora uses to call back into this app over the internal docker network.
      WOPI_PUBLIC_URL: ${WOPI_PUBLIC_URL:-http://app:5000}
      # --- Public URL (required) ---
      # Used as the base for OIDC redirects and the cookie domain logic. MUST
      # match what the user's browser sees (e.g. https://studio.your-domain.tld
      # behind a TLS proxy, or http://localhost:5000 for local testing).
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL in your .env (e.g. https://studio.your-domain.tld)}
      # --- Authentik (OIDC) — OPTIONAL ---
      # Leave all three blank to run with local accounts only. When all three
      # are set, the login page also shows "Continue with Authentik".
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-}
      AUTHENTIK_CLIENT_ID: ${AUTHENTIK_CLIENT_ID:-}
      AUTHENTIK_CLIENT_SECRET: ${AUTHENTIK_CLIENT_SECRET:-}
      # --- SendGrid email notifications (optional) ---
      # When SENDGRID_API_KEY + EMAIL_FROM are both set, project/task events
      # email project members and the share dialog can email share links.
      # Without them, all sends are silently skipped (logged) — the app still
      # boots and works normally.
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Cue}
    volumes:
      - uploads:/app/artifacts/api-server/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    # By default Collabora is only reachable on the docker network — put a TLS reverse proxy
    # (Caddy/Traefik/nginx) in front and route it from there. To expose it directly for local
    # testing, set COLLABORA_PORT in your .env (e.g. COLLABORA_PORT=9980).
    ports:
      - "${COLLABORA_BIND:-127.0.0.1}:${COLLABORA_PORT:-9980}:9980"
    environment:
      # Allow the app container to act as a WOPI host
      aliasgroup1: http://app:5000
      # Disable internal TLS — assumes a reverse proxy handles TLS in front
      extra_params: --o:ssl.enable=false --o:ssl.termination=true
      username: ${COLLABORA_ADMIN_USER:?set COLLABORA_ADMIN_USER in your .env}
      password: ${COLLABORA_ADMIN_PASSWORD:?set COLLABORA_ADMIN_PASSWORD to a strong random string in your .env}
      dictionaries: en_US
    cap_add:
      - MKNOD
    tty: true

volumes:
  pgdata:
  uploads:
