openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Studio PM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: studios
    description: Studio project operations
  - name: milestones
    description: Milestone operations
  - name: tasks
    description: Task operations
  - name: members
    description: Team member operations
  - name: comments
    description: Comment operations
  - name: dashboard
    description: Dashboard summary operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Studios ──────────────────────────────────────────────────────────────
  /studios:
    get:
      operationId: listStudios
      tags: [studios]
      summary: List all studios
      responses:
        "200":
          description: List of studios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Studio"
    post:
      operationId: createStudio
      tags: [studios]
      summary: Create a studio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Studio"

  /studios/{id}:
    get:
      operationId: getStudio
      tags: [studios]
      summary: Get a studio by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Studio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Studio"
        "404":
          description: Not found
    patch:
      operationId: updateStudio
      tags: [studios]
      summary: Update a studio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudioUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Studio"
    delete:
      operationId: deleteStudio
      tags: [studios]
      summary: Delete a studio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /studios/{id}/progress:
    get:
      operationId: getStudioProgress
      tags: [studios]
      summary: Get completion breakdown for a studio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Progress breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudioProgress"

  # ── Milestones ────────────────────────────────────────────────────────────
  /studios/{studioId}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a studio
      parameters:
        - name: studioId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      parameters:
        - name: studioId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /milestones/{id}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tasks ─────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (optionally filtered by studio or milestone)
      parameters:
        - name: studioId
          in: query
          schema:
            type: integer
        - name: milestoneId
          in: query
          schema:
            type: integer
        - name: assigneeId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/upcoming:
    get:
      operationId: listUpcomingTasks
      tags: [tasks]
      summary: Get tasks due in the next 14 days across all studios
      responses:
        "200":
          description: Upcoming tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # ── Comments ─────────────────────────────────────────────────────────────
  /tasks/{taskId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Team Members ─────────────────────────────────────────────────────────
  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Global dashboard summary — studio counts, task stats, upcoming deadlines
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed across all studios
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Studio ──────────────────────────────────────────────────────────────
    Studio:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:             { type: integer }
        name:           { type: string }
        description:    { type: ["string", "null"] }
        location:       { type: ["string", "null"] }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: ["string", "null"] }
        startDate:      { type: ["string", "null"] }
        targetDate:     { type: ["string", "null"] }
        completedDate:  { type: ["string", "null"] }
        budget:         { type: ["number", "null"] }
        createdAt:      { type: string }
        updatedAt:      { type: string }

    StudioInput:
      type: object
      required: [name]
      properties:
        name:           { type: string, minLength: 1 }
        description:    { type: string }
        location:       { type: string }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: string }
        startDate:      { type: string }
        targetDate:     { type: string }
        budget:         { type: number }

    StudioUpdate:
      type: object
      properties:
        name:           { type: string, minLength: 1 }
        description:    { type: string }
        location:       { type: string }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: string }
        startDate:      { type: string }
        targetDate:     { type: string }
        completedDate:  { type: string }
        budget:         { type: number }

    StudioProgress:
      type: object
      required: [studioId, totalTasks, completedTasks, overdueTasks, percentComplete, byCategory]
      properties:
        studioId:        { type: integer }
        totalTasks:      { type: integer }
        completedTasks:  { type: integer }
        overdueTasks:    { type: integer }
        percentComplete: { type: number }
        byCategory:
          type: array
          items:
            type: object
            required: [category, total, completed]
            properties:
              category:  { type: string }
              total:     { type: integer }
              completed: { type: integer }

    # ── Milestone ───────────────────────────────────────────────────────────
    Milestone:
      type: object
      required: [id, studioId, name, status, createdAt]
      properties:
        id:          { type: integer }
        studioId:    { type: integer }
        name:        { type: string }
        description: { type: ["string", "null"] }
        dueDate:     { type: ["string", "null"] }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: ["string", "null"] }
        createdAt:   { type: string }

    MilestoneInput:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        dueDate:     { type: string }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: string }

    MilestoneUpdate:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        dueDate:     { type: string }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: string }

    # ── Task ────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, studioId, title, status, priority, category, createdAt]
      properties:
        id:          { type: integer }
        studioId:    { type: integer }
        milestoneId: { type: ["integer", "null"] }
        assigneeId:  { type: ["integer", "null"] }
        title:       { type: string }
        description: { type: ["string", "null"] }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }
        createdAt:   { type: string }
        updatedAt:   { type: string }
        # Joined fields
        assigneeName:   { type: ["string", "null"] }
        studioName:     { type: ["string", "null"] }
        milestoneName:  { type: ["string", "null"] }

    TaskInput:
      type: object
      required: [studioId, title, status, priority, category]
      properties:
        studioId:    { type: integer }
        milestoneId: { type: integer }
        assigneeId:  { type: integer }
        title:       { type: string, minLength: 1 }
        description: { type: string }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: string }

    TaskUpdate:
      type: object
      properties:
        milestoneId: { type: integer }
        assigneeId:  { type: integer }
        title:       { type: string }
        description: { type: string }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: string }
        completedAt: { type: string }

    # ── Comment ─────────────────────────────────────────────────────────────
    Comment:
      type: object
      required: [id, taskId, content, authorName, createdAt]
      properties:
        id:         { type: integer }
        taskId:     { type: integer }
        authorId:   { type: ["integer", "null"] }
        authorName: { type: string }
        content:    { type: string }
        createdAt:  { type: string }

    CommentInput:
      type: object
      required: [content, authorName]
      properties:
        authorId:   { type: integer }
        authorName: { type: string, minLength: 1 }
        content:    { type: string, minLength: 1 }

    # ── Member ──────────────────────────────────────────────────────────────
    Member:
      type: object
      required: [id, name, role, createdAt]
      properties:
        id:         { type: integer }
        name:       { type: string }
        email:      { type: ["string", "null"] }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: ["string", "null"] }
        avatarUrl:  { type: ["string", "null"] }
        createdAt:  { type: string }

    MemberInput:
      type: object
      required: [name, role]
      properties:
        name:       { type: string, minLength: 1 }
        email:      { type: string }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: string }
        avatarUrl:  { type: string }

    MemberUpdate:
      type: object
      properties:
        name:       { type: string }
        email:      { type: string }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: string }
        avatarUrl:  { type: string }

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalStudios, activeStudios, totalTasks, completedTasks, overdueTasks, upcomingDeadlines, tasksByStatus, tasksByCategory]
      properties:
        totalStudios:       { type: integer }
        activeStudios:      { type: integer }
        totalTasks:         { type: integer }
        completedTasks:     { type: integer }
        overdueTasks:       { type: integer }
        upcomingDeadlines:
          type: array
          items:
            type: object
            required: [type, id, name, dueDate, studioName]
            properties:
              type:       { type: string, enum: [milestone, task] }
              id:         { type: integer }
              name:       { type: string }
              dueDate:    { type: string }
              studioName: { type: string }
              studioId:   { type: integer }
        tasksByStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status: { type: string }
              count:  { type: integer }
        tasksByCategory:
          type: array
          items:
            type: object
            required: [category, count]
            properties:
              category: { type: string }
              count:    { type: integer }

    ActivityEntry:
      type: object
      required: [id, type, message, studioId, studioName, createdAt]
      properties:
        id:         { type: integer }
        type:       { type: string, enum: [task_created, task_updated, task_completed, milestone_completed, comment_added, studio_created] }
        message:    { type: string }
        studioId:   { type: integer }
        studioName: { type: string }
        entityId:   { type: ["integer", "null"] }
        entityName: { type: ["string", "null"] }
        actorName:  { type: ["string", "null"] }
        createdAt:  { type: string }
