openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Project PM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project project operations
  - name: milestones
    description: Milestone operations
  - name: tasks
    description: Task operations
  - name: members
    description: Team member operations
  - name: comments
    description: Comment operations
  - name: dashboard
    description: Dashboard summary operations
  - name: documents
    description: Document operations
  - name: folders
    description: Document folder operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Projects ──────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/progress:
    get:
      operationId: getProjectProgress
      tags: [projects]
      summary: Get completion breakdown for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Progress breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectProgress"

  # ── Milestones ────────────────────────────────────────────────────────────
  /projects/{projectId}/milestones:
    get:
      operationId: listMilestones
      tags: [milestones]
      summary: List milestones for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Milestone"
    post:
      operationId: createMilestone
      tags: [milestones]
      summary: Create a milestone
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"

  /milestones/{id}:
    patch:
      operationId: updateMilestone
      tags: [milestones]
      summary: Update a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MilestoneUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Milestone"
    delete:
      operationId: deleteMilestone
      tags: [milestones]
      summary: Delete a milestone
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Tasks ─────────────────────────────────────────────────────────────────
  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks (optionally filtered by project or milestone)
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: milestoneId
          in: query
          schema:
            type: integer
        - name: assigneeId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/upcoming:
    get:
      operationId: listUpcomingTasks
      tags: [tasks]
      summary: Get tasks due in the next 14 days across all projects
      responses:
        "200":
          description: Upcoming tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"

  # ── Comments ─────────────────────────────────────────────────────────────
  /tasks/{taskId}/comments:
    get:
      operationId: listComments
      tags: [comments]
      summary: List comments for a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"
    post:
      operationId: createComment
      tags: [comments]
      summary: Add a comment to a task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Comment"

  /comments/{id}:
    delete:
      operationId: deleteComment
      tags: [comments]
      summary: Delete a comment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Team Members ─────────────────────────────────────────────────────────
  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Create a team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
    delete:
      operationId: deleteMember
      tags: [members]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Dashboard ─────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Global dashboard summary — project counts, task stats, upcoming deadlines
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ── Documents ─────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents (all, or filtered by project)
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: global
          in: query
          description: If true, return only global (non-project) documents
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            type: string
        - name: folderId
          in: query
          description: Filter to documents inside this folder (use 0 for root of the given scope)
          schema:
            type: integer
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create a document entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Folders ───────────────────────────────────────────────────────────────
  /folders:
    get:
      operationId: listFolders
      tags: [folders]
      summary: List document folders (optionally filtered by project)
      parameters:
        - name: projectId
          in: query
          schema:
            type: integer
        - name: global
          in: query
          description: If true, return only global (non-project) folders
          schema:
            type: boolean
      responses:
        "200":
          description: Folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentFolder"
    post:
      operationId: createFolder
      tags: [folders]
      summary: Create a document folder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentFolderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentFolder"

  /folders/{id}:
    patch:
      operationId: updateFolder
      tags: [folders]
      summary: Rename or move a folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentFolderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentFolder"
    delete:
      operationId: deleteFolder
      tags: [folders]
      summary: Delete an empty folder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "409":
          description: Folder is not empty

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Recent activity feed across all projects
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  # ── Share links ─────────────────────────────────────────────────────────────
  /share-links:
    get:
      operationId: listShareLinks
      tags: [shares]
      summary: List share links for a given resource
      parameters:
        - in: query
          name: resourceType
          required: true
          schema: { type: string, enum: [project, task, document] }
        - in: query
          name: resourceId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Active and inactive links for the resource
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ShareLink" }
    post:
      operationId: createShareLink
      tags: [shares]
      summary: Create a new share link
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ShareLinkInput" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ShareLink" }

  /share-links/{id}:
    delete:
      operationId: revokeShareLink
      tags: [shares]
      summary: Revoke a share link
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204": { description: Revoked }

  /public/shares/{token}:
    get:
      operationId: getPublicShare
      tags: [shares]
      summary: Public read-only view of a shared resource (no auth required)
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The shared resource
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicShare" }
        "404":
          description: Link not found, revoked, or expired

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Project ──────────────────────────────────────────────────────────────
    Project:
      type: object
      required: [id, name, status, createdAt]
      properties:
        id:             { type: integer }
        name:           { type: string }
        description:    { type: ["string", "null"] }
        location:       { type: ["string", "null"] }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: ["string", "null"] }
        startDate:      { type: ["string", "null"] }
        targetDate:     { type: ["string", "null"] }
        completedDate:  { type: ["string", "null"] }
        budget:         { type: ["number", "null"] }
        createdAt:      { type: string }
        updatedAt:      { type: string }

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:           { type: string, minLength: 1 }
        description:    { type: string }
        location:       { type: string }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: string }
        startDate:      { type: string }
        targetDate:     { type: string }
        budget:         { type: number }

    ProjectUpdate:
      type: object
      properties:
        name:           { type: string, minLength: 1 }
        description:    { type: string }
        location:       { type: string }
        status:         { type: string, enum: [planning, in_progress, on_hold, completed] }
        phase:          { type: string }
        startDate:      { type: string }
        targetDate:     { type: string }
        completedDate:  { type: string }
        budget:         { type: number }

    ShareLinkInput:
      type: object
      required: [resourceType, resourceId]
      properties:
        resourceType:
          type: string
          enum: [project, task, document]
        resourceId: { type: integer }
        expiresAt:
          type: string
          description: ISO timestamp. Omit for no expiry.

    ShareLink:
      type: object
      required: [id, token, resourceType, resourceId, url, createdAt, active]
      properties:
        id:           { type: integer }
        token:        { type: string }
        resourceType: { type: string, enum: [project, task, document] }
        resourceId:   { type: integer }
        url:          { type: string, description: "Absolute URL to the public share page." }
        createdBy:    { type: integer }
        createdAt:    { type: string }
        expiresAt:    { type: string }
        revokedAt:    { type: string }
        active:       { type: boolean }

    PublicShare:
      type: object
      required: [resourceType, resourceId, createdAt]
      properties:
        resourceType: { type: string, enum: [project, task, document] }
        resourceId:   { type: integer }
        createdAt:    { type: string }
        expiresAt:    { type: string }
        project:      { $ref: "#/components/schemas/Project" }
        task:         { $ref: "#/components/schemas/Task" }
        document:     { $ref: "#/components/schemas/Document" }
        projectName:  { type: string, description: "Name of the project this resource belongs to, if any." }
        # For project shares: the project's children so the public page can
        # show a dashboard-like view (milestones, tasks, documents).
        milestones:
          type: array
          items: { $ref: "#/components/schemas/Milestone" }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/Task" }
        documents:
          type: array
          items: { $ref: "#/components/schemas/Document" }
        # For document shares: an absolute URL the public page can use to fetch
        # the file content (streams through the public file endpoint).
        fileUrl:      { type: string }
        fileMimeType: { type: string }

    ProjectProgress:
      type: object
      required: [projectId, totalTasks, completedTasks, overdueTasks, totalMilestones, completedMilestones, percentComplete, taskPercentComplete, milestonePercentComplete, byCategory]
      properties:
        projectId:                 { type: integer }
        totalTasks:                { type: integer }
        completedTasks:            { type: integer }
        overdueTasks:              { type: integer }
        totalMilestones:           { type: integer }
        completedMilestones:       { type: integer }
        percentComplete:           { type: number, description: "Blended completion across tasks and milestones (weighted by item count)." }
        taskPercentComplete:       { type: number }
        milestonePercentComplete:  { type: number }
        byCategory:
          type: array
          items:
            type: object
            required: [category, total, completed]
            properties:
              category:  { type: string }
              total:     { type: integer }
              completed: { type: integer }

    # ── Milestone ───────────────────────────────────────────────────────────
    Milestone:
      type: object
      required: [id, projectId, name, status, createdAt]
      properties:
        id:          { type: integer }
        projectId:    { type: integer }
        name:        { type: string }
        description: { type: ["string", "null"] }
        dueDate:     { type: ["string", "null"] }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: ["string", "null"] }
        createdAt:   { type: string }

    MilestoneInput:
      type: object
      required: [name]
      properties:
        name:        { type: string, minLength: 1 }
        description: { type: string }
        dueDate:     { type: string }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: string }

    MilestoneUpdate:
      type: object
      properties:
        name:        { type: string }
        description: { type: string }
        dueDate:     { type: string }
        status:      { type: string, enum: [pending, in_progress, completed, missed] }
        color:       { type: string }

    # ── Task ────────────────────────────────────────────────────────────────
    Task:
      type: object
      required: [id, projectId, title, status, priority, category, createdAt]
      properties:
        id:          { type: integer }
        projectId:    { type: integer }
        milestoneId: { type: ["integer", "null"] }
        assigneeId:  { type: ["integer", "null"] }
        title:       { type: string }
        description: { type: ["string", "null"] }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: ["string", "null"] }
        completedAt: { type: ["string", "null"] }
        createdAt:   { type: string }
        updatedAt:   { type: string }
        # Joined fields
        assigneeName:   { type: ["string", "null"] }
        projectName:     { type: ["string", "null"] }
        milestoneName:  { type: ["string", "null"] }

    TaskInput:
      type: object
      required: [projectId, title, status, priority, category]
      properties:
        projectId:    { type: integer }
        milestoneId: { type: integer }
        assigneeId:  { type: integer }
        title:       { type: string, minLength: 1 }
        description: { type: string }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: string }

    TaskUpdate:
      type: object
      properties:
        milestoneId: { type: integer }
        assigneeId:  { type: integer }
        title:       { type: string }
        description: { type: string }
        status:      { type: string, enum: [todo, in_progress, blocked, review, done] }
        priority:    { type: string, enum: [low, medium, high, critical] }
        category:    { type: string, enum: [construction, electrical, av, it, network, acoustics, furnishing, signage, general] }
        dueDate:     { type: string }
        completedAt: { type: string }

    # ── Comment ─────────────────────────────────────────────────────────────
    Comment:
      type: object
      required: [id, taskId, content, authorName, createdAt]
      properties:
        id:         { type: integer }
        taskId:     { type: integer }
        authorId:   { type: ["integer", "null"] }
        authorName: { type: string }
        content:    { type: string }
        createdAt:  { type: string }

    CommentInput:
      type: object
      required: [content, authorName]
      properties:
        authorId:   { type: integer }
        authorName: { type: string, minLength: 1 }
        content:    { type: string, minLength: 1 }

    # ── Member ──────────────────────────────────────────────────────────────
    Member:
      type: object
      required: [id, name, role, createdAt]
      properties:
        id:         { type: integer }
        name:       { type: string }
        email:      { type: ["string", "null"] }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: ["string", "null"] }
        avatarUrl:  { type: ["string", "null"] }
        createdAt:  { type: string }

    MemberInput:
      type: object
      required: [name, role]
      properties:
        name:       { type: string, minLength: 1 }
        email:      { type: string }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: string }
        avatarUrl:  { type: string }

    MemberUpdate:
      type: object
      properties:
        name:       { type: string }
        email:      { type: string }
        role:       { type: string, enum: [producer, engineer, it, integrator, manager, contractor] }
        department: { type: string }
        avatarUrl:  { type: string }

    # ── Dashboard ────────────────────────────────────────────────────────────
    DashboardSummary:
      type: object
      required: [totalProjects, activeProjects, totalTasks, completedTasks, overdueTasks, upcomingDeadlines, tasksByStatus, tasksByCategory]
      properties:
        totalProjects:       { type: integer }
        activeProjects:      { type: integer }
        totalTasks:         { type: integer }
        completedTasks:     { type: integer }
        overdueTasks:       { type: integer }
        upcomingDeadlines:
          type: array
          items:
            type: object
            required: [type, id, name, dueDate, projectName]
            properties:
              type:       { type: string, enum: [milestone, task] }
              id:         { type: integer }
              name:       { type: string }
              dueDate:    { type: string }
              projectName: { type: string }
              projectId:   { type: integer }
        tasksByStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status: { type: string }
              count:  { type: integer }
        tasksByCategory:
          type: array
          items:
            type: object
            required: [category, count]
            properties:
              category: { type: string }
              count:    { type: integer }

    # ── Document ─────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, title, category, createdAt]
      properties:
        id:          { type: integer }
        projectId:    { type: ["integer", "null"] }
        projectName:  { type: ["string", "null"] }
        folderId:    { type: ["integer", "null"] }
        title:       { type: string }
        description: { type: ["string", "null"] }
        url:         { type: ["string", "null"] }
        notes:       { type: ["string", "null"] }
        category:    { type: string, enum: [spec, plan, permit, vendor, as_built, safety, general] }
        uploadedBy:  { type: ["string", "null"] }
        version:     { type: ["string", "null"] }
        createdAt:   { type: string }
        updatedAt:   { type: string }

    DocumentInput:
      type: object
      required: [title, category]
      properties:
        projectId:    { type: integer }
        folderId:    { type: integer }
        title:       { type: string, minLength: 1 }
        description: { type: string }
        url:         { type: string }
        notes:       { type: string }
        category:    { type: string, enum: [spec, plan, permit, vendor, as_built, safety, general] }
        uploadedBy:  { type: string }
        version:     { type: string }

    DocumentUpdate:
      type: object
      properties:
        projectId:    { type: integer }
        folderId:    { type: ["integer", "null"] }
        title:       { type: string }
        description: { type: string }
        url:         { type: string }
        notes:       { type: string }
        category:    { type: string, enum: [spec, plan, permit, vendor, as_built, safety, general] }
        uploadedBy:  { type: string }
        version:     { type: string }

    DocumentFolder:
      type: object
      required: [id, name, createdAt]
      properties:
        id:        { type: integer }
        projectId: { type: ["integer", "null"] }
        parentId:  { type: ["integer", "null"] }
        name:      { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }

    DocumentFolderInput:
      type: object
      required: [name]
      properties:
        projectId: { type: integer }
        parentId:  { type: integer }
        name:      { type: string, minLength: 1 }

    DocumentFolderUpdate:
      type: object
      properties:
        name:     { type: string, minLength: 1 }
        parentId: { type: ["integer", "null"] }

    ActivityEntry:
      type: object
      required: [id, type, message, projectId, projectName, createdAt]
      properties:
        id:         { type: integer }
        type:       { type: string, enum: [task_created, task_updated, task_completed, milestone_completed, comment_added, project_created] }
        message:    { type: string }
        projectId:   { type: integer }
        projectName: { type: string }
        entityId:   { type: ["integer", "null"] }
        entityName: { type: ["string", "null"] }
        actorName:  { type: ["string", "null"] }
        createdAt:  { type: string }
